<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zep — 2D Metaverse</title>
    <meta name="description" content="A real-time 2D spatial metaverse. Move, explore, and connect based on proximity." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/styles/global.css" />
  </head>
  <body>

    <!-- ── STAR FIELD ── -->
    <div class="stars" id="star-field"></div>

    <!-- ── LOGIN SCREEN ── -->
    <div id="login-screen">
      <div class="login-card">
        <div class="logo">
          <div class="orbit-ring"></div>
          <div class="logo-title">ZEP</div>
          <div class="logo-sub">Spatial Metaverse</div>
        </div>

        <div class="form-group">
          <label for="display-name">Your Name</label>
          <input
            id="display-name"
            type="text"
            placeholder="Enter your display name"
            maxlength="20"
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="space-id">Space ID</label>
          <input
            id="space-id"
            type="text"
            placeholder="Paste a Space ID to join"
            autocomplete="off"
          />
          <div class="hint-text">Get a Space ID from the HTTP API: POST /api/v1/space/create</div>
        </div>

        <button class="btn-connect" id="connect-btn">
          ⚡ Enter World
        </button>

        <div class="status-text" id="status-text"></div>
        <div class="error-text" id="error-text"></div>
      </div>
    </div>

    <!-- ── GAME CONTAINER ── -->
    <div id="game-container">
      <div id="phaser-canvas"></div>

      <!-- Top HUD Bar -->
      <div id="hud">
        <div class="hud-bar">
          <div class="hud-left">
            <div class="hud-pill">
              <span class="dot"></span>
              <span class="label">Space</span>
              <span class="value" id="space-name">—</span>
            </div>
            <div class="hud-pill">
              <span class="label">You</span>
              <span class="value" id="my-session">—</span>
            </div>
          </div>
          <div class="hud-center">
            <span class="logo-title" style="font-size:16px;letter-spacing:4px;">ZEP</span>
          </div>
          <div class="hud-right">
            <div class="hud-pill">
              <span class="dot"></span>
              <span class="value" id="player-count">1 online</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Proximity Panel -->
      <div id="proximity-panel">
        <div class="proximity-title">👥 Nearby Players</div>
        <div id="nearby-users">
          <span class="no-nearby">No one nearby</span>
        </div>
      </div>

      <!-- Controls Hint -->
      <div id="controls-hint">
        <span>W A S D</span> or <span>↑ ↓ ← →</span> to move
      </div>
    </div>

    <!-- ── TOAST NOTIFICATION ── -->
    <div id="notif-toast"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
